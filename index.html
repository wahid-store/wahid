<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Wahid Official</title>
<meta name="description" content="Wahid Official - Marketing & IT student personal website">
<meta name="keywords" content="Wahid Official, Wahid Finland, Wahid IT, Wahid Marketing">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* TOP BAR */
.topbar{
    background:#00eaff;
  myphoto.jpg
    text-align:center;
    padding:10px;
    font-weight:bold;
}

/* HERO */
.hero{
    height:100vh;
    background:url("myphoto.jpg") center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.hero h1{
    font-size:80px;
    color:#00eaff;
}

.hero p{
    margin-top:10px;
}

.btn{
    margin-top:20px;
    padding:10px 20px;
    border:2px solid #00eaff;
    color:#00eaff;
    background:none;
    cursor:pointer;
}

/* PRODUCTS */
.products{
    display:none;
    padding:50px;
    text-align:center;
}

.card{
    background:#1e293b;
    padding:20px;
    margin:20px;
    display:inline-block;
    width:200px;
    border-radius:10px;
    cursor:pointer;
}

.card img{
    width:100%;
}

.card button{
    margin-top:10px;
    padding:5px 10px;
    background:#00eaff;
    border:none;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    color:black;
    padding:20px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="topbar">
Appointment available every 30 minutes — book your meeting
</div>

<div class="hero">
    <div>
        <h1>Wahid Official</h1>
        <p>I am in Marketing & studying IT</p>
        <button class="btn" onclick="showProducts()">Products</button>
        <button class="btn" onclick="book()">Book Time</button>
    </div>
</div>

<div class="products" id="products">

<h2>Products</h2>

<div class="card" onclick="openModal()">
<img src="https://images.unsplash.com/photo-1523170335258-f5ed11844a49">
<h3>Watch</h3>
<p>€500</p>
<button>View</button>
</div>

<div class="card" onclick="openModal()">
<img src="https://images.unsplash.com/photo-1511499767150-a48a237f0083">
<h3>Glasses</h3>
<p>€300</p>
<button>View</button>
</div>

<div class="card" onclick="openModal()">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<h3>Shoes</h3>
<p>€200</p>
<button>View</button>
</div>

<div class="card" onclick="openModal()">
<img src="https://images.unsplash.com/photo-1513708927688-890a1d6a4f5d">
<h3>Headphones</h3>
<p>€150</p>
<button>View</button>
</div>

<div class="card" onclick="openModal()">
<img src="https://images.unsplash.com/photo-1585386959984-a4155224a1ad">
<h3>Phone</h3>
<p>€800</p>
<button>View</button>
</div>

</div>

<div class="modal" id="modal">
<div class="modal-content">
<h2>Product Details</h2>
<p>Currently not available</p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>
function showProducts(){
    document.getElementById("products").style.display="block";
    window.scrollTo(0,600);
}

function openModal(){
    document.getElementById("modal").style.display="flex";
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

function book(){
    window.open("https://calendar.google.com");
}
</script>

</body>
</html>
