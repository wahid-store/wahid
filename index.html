<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wahid</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  height: 100vh;
  font-family: Poppins, sans-serif;
  background: url('QOGT6539.JPG') no-repeat center center/cover;
}

/* dark overlay */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  top: 0;
  left: 0;
}

/* title */
h1 {
  position: relative;
  z-index: 1;
  text-align: center;
  font-size: 80px;
  color: gold;
  letter-spacing: 10px;
}

/* products */
.products {
  position: relative;
  z-index: 1;
  display: flex;
  gap: 30px;
  justify-content: center;
  margin-top: 50px;
}

.card {
  background: black;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  color: white;
  width: 200px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

button {
  background: gold;
  border: none;
  padding: 10px;
  cursor: pointer;
  margin-top: 10px;
}

</style>
</head>

<body>

<h1>WAHID</h1>

<div class="products">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1523170335258-f5ed11844a49">
    <h3>Watch</h3>
    <p>€500</p>
    <button onclick="add()">Buy</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1511499767150-a48a237f0083">
    <h3>Glasses</h3>
    <p>€300</p>
    <button onclick="add()">Buy</button>
  </div>

</div>

<script>
function add(){
  alert("Added to cart 🛒");
}
</script>

</body>
</html>
