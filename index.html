<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wahid</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: Poppins, sans-serif;
  background: #0a0a0a;
  color: white;
}

/* NAVBAR */
nav {
  position: fixed;
  width: 100%;
  top: 0;
  display: flex;
  justify-content: space-between;
  padding: 20px 50px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
}

nav h2 {
  margin: 0;
  font-weight: 800;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('QOGT6539.JPG') center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
}

.hero::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.hero h1 {
  position: relative;
  font-size: 120px;
  letter-spacing: 15px;
  margin: 0;
  color: gold;
}

/* typing animation */
.typing {
  position: relative;
  font-size: 22px;
  margin-top: 10px;
  border-right: 2px solid white;
  white-space: nowrap;
  overflow: hidden;
  width: 0;
  animation: typing 3s steps(20) forwards, blink 0.7s infinite;
}

@keyframes typing {
  from { width: 0 }
  to { width: 230px }
}

@keyframes blink {
  50% { border-color: transparent }
}

/* PRODUCTS */
.products {
  padding: 100px 50px;
  display: flex;
  justify-content: center;
  gap: 40px;
  background: #111;
}

.card {
  background: #1a1a1a;
  border-radius: 12px;
  overflow: hidden;
  width: 240px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card h3 {
  margin: 10px 0;
}

.price {
  color: gold;
}

button {
  margin: 10px;
  padding: 10px 20px;
  border: none;
  background: gold;
  cursor: pointer;
}

</style>
</head>

<body>

<nav>
  <h2>Wahid</h2>
</nav>

<div class="hero">
  <h1>WAHID</h1>
  <p class="typing">TikTok: unknown909</p>
</div>

<div class="products">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1523170335258-f5ed11844a49">
    <h3>Watch</h3>
    <p class="price">€500</p>
    <button onclick="add()">Buy</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1511499767150-a48a237f0083">
    <h3>Glasses</h3>
    <p class="price">€300</p>
    <button onclick="add()">Buy</button>
  </div>

</div>

<script>
function add(){
  alert("Added to cart 🛒");
}
</script>

</body>
</html>
