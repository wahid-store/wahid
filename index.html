<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>Wahid</title>

<!-- فونت گوگل -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #000000, #111);
    color: white;
    text-align: center;
}

header {
    padding: 40px;
}

h1 {
    font-size: 60px;
    letter-spacing: 5px;
    color: gold;
    text-shadow: 0 0 20px gold;
}

.subtitle {
    color: #ccc;
    margin-bottom: 30px;
}

/* محصولات */
.products {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.card {
    background: #111;
    border: 1px solid gold;
    border-radius: 15px;
    width: 250px;
    margin: 15px;
    padding: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px gold;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.card h3 {
    color: gold;
}

button {
    background: gold;
    color: black;
    border: none;
    padding: 10px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
}

#cart {
    position: fixed;
    top: 15px;
    right: 15px;
    background: black;
    border: 1px solid gold;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<header>
    <h1>Wahid</h1>
    <div class="subtitle">Luxury Store</div>
</header>

<div id="cart">
🛒 <span id="count">0</span>
</div>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/250">
<h3>Watch</h3>
<p>€500</p>
<button onclick="add()">Buy</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250">
<h3>Glasses</h3>
<p>€300</p>
<button onclick="add()">Buy</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250">
<h3>Bag</h3>
<p>€700</p>
<button onclick="add()">Buy</button>
</div>

</div>

<script>
let c = 0;
function add(){
    c++;
    document.getElementById("count").innerText = c;
}
</script>

</body>
</html>
