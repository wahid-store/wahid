<!DOCTYPE html>
<html>
<body style="background:black; color:white; text-align:center;">

<h2 style="background:lime; color:black;">
Appointment every 30 minutes
</h2>

<h1>WAHID</h1>

<p>I am in Marketing & studying IT</p>

<button onclick="show()">Explore</button>

<div id="products" style="display:none;">

  <h2>Products</h2>

  <div onclick="openP('Watch')" style="cursor:pointer;">
    Watch €500
  </div>

  <div onclick="openP('Glasses')" style="cursor:pointer;">
    Glasses €300
  </div>

</div>

<div id="view"></div>

<script>
function show(){
  document.getElementById("products").style.display="block";
}

function openP(name){
  document.getElementById("products").style.display="none";
  document.getElementById("view").innerHTML =
  name + "<br><button onclick='location.reload()'>Back</button>";
}
</script>

</body>
</html>
