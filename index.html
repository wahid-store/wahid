<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wahid</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  color:white;
}

/* navbar */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:rgba(0,0,0,0.5);
}

nav a{
  color:white;
  margin-left:20px;
  text-decoration:none;
}

/* hero */
.hero{
  height:100vh;
  background:url("Q0GT6539.JPG") no-repeat center/cover;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.hero::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.hero h1{
  font-size:80px;
  color:#00ffcc;
  position:relative;
  animation:fade 2s infinite alternate;
}

.hero p{
  position:relative;
}

.hero button{
  margin-top:20px;
  padding:10px 25px;
  border:2px solid #00ffcc;
  background:none;
  color:#00ffcc;
  cursor:pointer;
}

/* products */
.products{
  background:#111;
  padding:60px;
  display:flex;
  justify-content:center;
  gap:30px;
}

.card{
  background:#222;
  padding:20px;
  border-radius:15px;
  text-align:center;
  width:200px;
}

.card img{
  width:100%;
  border-radius:10px;
}

.card button{
  margin-top:10px;
  background:#00ffcc;
  border:none;
  padding:8px 15px;
  cursor:pointer;
}

/* footer */
footer{
  text-align:center;
  padding:20px;
  background:black;
}

/* animation */
@keyframes fade{
  from{opacity:0.5}
  to{opacity:1}
}
</style>

</head>

<body>

<nav>
  <div>Wahid</div>
  <div>
    <a href="#">Home</a>
    <a href="#">Products</a>
  </div>
</nav>

<section class="hero">
  <h1>WAHID</h1>
  <p>I am in Marketing & studying IT</p>
  <button onclick="scrollToProducts()">Explore</button>
</section>

<section class="products" id="products">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1523170335258-f5ed11844a49">
    <h3>Watch</h3>
    <p>€500</p>
    <button onclick="add()">Buy</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1511499767150-a48a237f0083">
    <h3>Glasses</h3>
    <p>€300</p>
    <button onclick="add()">Buy</button>
  </div>

</section>

<footer>
  TikTok: unknown909
</footer>

<script>
function add(){
  alert("Added to cart 🛒");
}

function scrollToProducts(){
  document.getElementById("products").scrollIntoView({
    behavior:"smooth"
  });
}
</script>

</body>
</html>
